<!DOCTYPE html>
<head>
	<meta charset="utf-8">
	<title>Homepie</title>
	<link rel="stylesheet" type="text/css" href="/style/master.css">
</head>
<body>
	<div id="root">
		<span>Günaydin-Homeserve</span>	

		<main>
			<span>Melde dich an:</span>

			<div class="box">
				<div id="burak" class="profile">Burak</div>
				<div id="beyza" class="profile">Beyza</div>
				<div id="yasar" class="profile">Yasar</div>
			</div>
		</main>
		
		<nav>
			<span>Wähle ein Modul:</div>
			
			<div class="box">
				<a id="home" class="image" href="/home">
					<img src="/res/homepie_logo.svg">
				</a>
				<a id="lockkliye" class="image" href="http://lockkliye.viewdns.net">
					<img src="/res/lockkliye_logo.svg">
				</a>
				<a id="synthia" class="image" href="http://synthia.viewdns.net">
					<img src="/res/synthia_logo.svg">
				</a>
			</div>
		</nav>

		<footer>Powered by a measly Raspberry PI 3</footer>
	</div>
</body>
<html>

<!DOCTYPE html>
<head>
	<meta charset="utf-8" />
	<title>Home Pie</title>
	
	<!-- Global -->
	<link rel="stylesheet" type="text/css" href="style/global.css" />
	<script type="text/javascript" src="js/global.js" defer></script>
	<!------------>

	<link rel="stylesheet" type="text/css" href="style/index.css" />

	<!-- Modules -->
	<!--<script type="module" src="js/auth.js" defer></script>--> 
	<!------------->	

	<script type="text/javascript" src="js/hash.js" defer></script> 
	<script type="text/javascript" src="js/index.js" defer></script>
</head>
<body>
	<div id="root">
		<div id="homepie">
			<img src="res/icon/homepie.svg" alt="An icon depicting a pie in front of a house">
			<span><p id="home">Home</p> <p id="pie">Pie</p></span>
		</div>	

		<main>
			<div class="box">
				<div id="burak" class="profile">
					<div id="admin" class="cat">Admin</div>
					<div class="name">Burak</div>
				</div>

				<div id="beyza" class="profile">
					<div id="user" class="cat">Nutzer</div>
					<div class="name">Beyza</div>
				</div>

				<div id="yasar" class="profile">
					<div id="user" class="cat">Nutzer</div>
					<div class="name">Yasar</div>
				</div>
			</div>
		</main>

		<nav class="hidden">
			<div class="box">
				<div class"imageBox">
					<a id="filemanager" class="image" href="/filemanager">
						<img src="/res/icon/nav/filemanager.svg" />
					</a>
					<span>FileManager</span>
				</div>
				
				<a id="profile" class="image" href="/profile">
					<img src="/res/icon/nav/profile.svg" />
				</a>
				
				<a id="settings" class="image" href="/settings">
					<img src="/res/icon/nav/settings.svg" />
				</a>
				
				<a id="api" class="image" href="http://api.homepie.net">
					<img src="/res/icon/nav/api.svg" />
				</a>

				<a id="lockkliye" class="image" href="http://lockkliye.homepie.net">
					<img src="/res/icon/nav/lockkliye.svg" />
				</a>
				
				<a id="synthia" class="image" href="http://synthia.homepie.net">
					<img src="/res/icon/nav/synthia.svg" />
				</a>
			</div>
		</nav>

		<footer>
			<p>Powered by a measly Raspberry PI 3</p>
			<div />
		</footer>
	</div>
</body>
</html>

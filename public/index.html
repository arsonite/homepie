<!DOCTYPE html>
<head>
	<meta charset="utf-8" />
	<title>Homepie</title>
	
	<!-- Global -->
	<link rel="stylesheet" type="text/css" href="style/global.css" />
	<script type="text/javascript" src="js/global.js" defer></script>
	<!------------>

	<link rel="stylesheet" type="text/css" href="style/index.css" />

	<!-- Modules -->
	<script type="module" src="mjs/auth.js" defer></script> 
	<!------------->	

	<script type="text/javascript" src="js/hash.js" defer></script> 
	<script type="text/javascript" src="js/index.js" defer></script>
</head>
<body>
	<div id="root">
		<span>Home Pie</span>

		<main>
			<span>Melde dich an:</span>

			<div class="box">
				<div id="burak" class="profile">
					<div id="admin" class="cat">Admin</div>
					<div class="name">Burak</div>
				</div>

				<div id="beyza" class="profile">
					<div id="user" class="cat">Nutzer</div>
					<div class="name">Beyza</div>
				</div>

				<div id="yasar" class="profile">
					<div id="user" class="cat">Nutzer</div>
					<div class="name">Yasar</div>
				</div>
			</div>
		</main>

		<nav class="hidden">
			<span>Wähle ein Modul:</span>

			<div class="box">
				<a id="home" class="image" href="/home">
					<img src="/res/icon/homepie_logo.svg" />
				</a>
				<a id="lockkliye" class="image" href="http://lockkliye.homepie.net">
					<img src="/res/icon/lockkliye_logo.svg" />
				</a>
				<a id="synthia" class="image" href="http://synthia.homepie.net">
					<img src="/res/icon/synthia_logo.svg" />
				</a>
			</div>
		</nav>

		<footer>Powered by a measly Raspberry PI 3</footer>
	</div>
</body>
</html>
